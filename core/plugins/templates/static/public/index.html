<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Plugin</title>
  <link rel="stylesheet" href="/plugin-kit/kit.css" />
  <script src="/plugin-kit/kit.js" defer></script>
</head>
<body class="ex">
  <div class="ex-card">
    <h1 class="ex-title">Your plugin is live 🎉</h1>
    <p class="ex-muted">
      This is your plugin's UI (<code>public/index.html</code>). Start by reading the
      docs — they list every enowx API you can call from here via
      <code>enowx.api(...)</code>.
    </p>
    <button id="docs" class="ex-btn">Read the plugin docs</button>
    <pre id="out" class="ex-out"></pre>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const out = document.getElementById("out");
      document.getElementById("docs").onclick = async () => {
        out.textContent = "Loading the API catalog…";
        try {
          // /api/docs is the stable plugin contract; show a quick summary here.
          const docs = await enowx.api("/api/docs");
          const groups = (docs.groups || []).map((g) => "• " + g.name).join("\n");
          out.textContent =
            "enowx API groups you can call from a plugin:\n\n" + groups +
            "\n\nFull reference: open the Docs app in enowx (or GET /api/docs).";
        } catch (e) {
          out.textContent = "Open the Docs app in enowx for the full plugin API reference.";
        }
      };
    });
  </script>
</body>
</html>
